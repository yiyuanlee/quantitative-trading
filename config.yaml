# ============================================================
# AlphaFlow 参数配置文件
# 所有策略参数集中管理，实盘/回测共用同一套配置
# ============================================================

strategy:
  # 均线周期参数
  fast_period: 10          # 快线周期 (EMA)
  slow_period: 25          # 慢线周期 (EMA)  [注: V3.0用的是30]
  trend_period: 200        # 趋势过滤均线周期 (SMA/EMA)

  # RSI 参数
  rsi_period: 14           # RSI 计算周期
  rsi_upper: 65            # RSI 上限（避免追高）

  # ADX 趋势强度参数
  adx_period: 14           # ADX 计算周期
  adx_threshold: 20        # ADX 阈值（低于此值不入场）

  # ATR 波动率参数
  atr_period: 14           # ATR 计算周期
  atr_multiplier: 2.5      # ATR 止损倍数

  # [P1-新增] 波动率状态过滤
  vol_filter_period: 100   # ATR 均值回看周期（100 个交易日）
  vol_filter_ratio: 0.8    # ATR / ATR均值 > 此比值才入场（过滤震荡市）

  # [P1-改进] ATR 动态移动止盈（替代固定 12%）
  trailing_atr_mult: 3.0   # 移动止盈距离 = 3.0 × ATR
  trailing_stop: 0.12      # 保留旧参数作为兜底上限

risk:
  risk_per_trade: 0.030    # 每笔交易风险敞口提升至 (3.0%)
  alloc_index: 0.60       # 指数类标的（VOO, QQQ）最大资金分配占比 60%
  alloc_stock: 0.40       # 个股类标的最大资金分配占比 40%

backtest:
  initial_cash: 10000.0    # 初始资金
  commission: 0.001       # 交易佣金 (0.1%)
  start_date: "2010-01-01" # [P0] 延长至 2010，覆盖多个牛熊周期
  end_date: "2026-05-13"

live:
  tws_host: "127.0.0.1"
  tws_port: 7497
  client_id: 1
  scan_interval_seconds: 3600

# 回测标的列表
tickers:
  - "QQQ"
  - "VOO"
  - "NVDA"
  - "AMD"
  - "TSLA"
  - "COIN"
  - "PLTR"
  - "MSTR"
  - "SMCI"
  - "CRWD"
  - "UPST"
  - "CVNA"
  - "SHOP"
  - "SQ"
  - "MARA"
  - "APP"
  - "NET"
